<!-- Start of Modals Component -->
<!-- Modals -->
<div id="contactModal" class="demo-modal">
    <div class="demo-modal-overlay"></div>
    <div class="demo-modal-container" style="max-width: 600px;">
        <button class="demo-close" id="closeContactBtn">&times;</button>
        <div class="demo-modal-content" style="text-align: left;">
            <h3>Contact Support</h3>
            <form id="contactForm">
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label>Email</label>
                    <input type="email" class="form-control"
                        style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;" required>
                </div>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label>Message</label>
                    <textarea class="form-control" rows="4"
                        style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;"
                        required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
            </form>
            <div id="contactSuccess" style="display: none; text-align: center; padding: 2rem 0;">
                <i data-lucide="check-circle"
                    style="width: 64px; height: 64px; color: #10b981; margin-bottom: 1rem;"></i>
                <h4>Message Sent!</h4>
                <p>We'll get back to you within 24 hours.</p>
            </div>
        </div>
    </div>
</div>

<!-- Chat Modal -->
<div id="chatModal" class="demo-modal">
    <div class="demo-modal-overlay"></div>
    <div class="demo-modal-container" style="max-width: 450px; position: fixed; bottom: 100px; right: 30px; margin: 0;">
        <button class="demo-close" id="closeChatBtn">&times;</button>
        <div class="chat-header"
            style="background: var(--color-primary); color: white; padding: var(--spacing-lg); border-radius: 16px 16px 0 0;">
            <h4 style="margin: 0; color: white;">Chat with us</h4>
            <p style="margin: 0; font-size: 0.8rem; opacity: 0.8;">We typically reply in minutes</p>
        </div>
        <div class="demo-modal-content" style="padding: 0;">
            <div id="chatMessages"
                style="height: 350px; overflow-y: auto; padding: var(--spacing-lg); display: flex; flex-direction: column; gap: var(--spacing-md);">
                <div
                    style="align-self: flex-start; max-width: 80%; background: #f3f4f6; padding: var(--spacing-sm) var(--spacing-md); border-radius: 0 16px 16px 16px; font-size: 0.95rem;">
                    Hello! How can we help you today?
                </div>
            </div>
            <form id="chatForm"
                style="padding: var(--spacing-md); border-top: 1px solid var(--color-border); display: flex; gap: 8px;">
                <input type="text" id="chatInput" placeholder="Type your message..."
                    style="flex: 1; border: none; outline: none; padding: 8px; font-size: 0.95rem;">
                <button type="submit"
                    style="background: none; border: none; color: var(--color-primary); cursor: pointer;">
                    <i data-lucide="send"></i>
                </button>
            </form>
        </div>
    </div>
</div>

<!-- Floating Action Button -->
<button id="fabBtn" class="fab">
    <i data-lucide="message-square"></i>
</button>
<!-- End of Modals Component -->
