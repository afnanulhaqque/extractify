<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Extractify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Outfit:wght@400;600;700&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .navbar {
            background-color: var(--color-bg-main);
            padding: var(--spacing-md) 0;
            border-bottom: 1px solid var(--color-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links {
            display: flex;
            gap: var(--spacing-lg);
            align-items: center;
        }

        .nav-link {
            font-weight: 600;
            color: var(--color-text-main);
            text-decoration: none;
        }

        .nav-link:hover {
            color: var(--color-primary);
        }

        .auth-container {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.05) 0%, rgba(134, 134, 172, 0.1) 100%);
            padding: var(--spacing-2xl) var(--spacing-md);
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            background: white;
            border-radius: var(--border-radius-xl);
            padding: var(--spacing-3xl) var(--spacing-2xl);
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--color-border);
        }

        .auth-header {
            text-align: center;
            margin-bottom: var(--spacing-2xl);
        }

        .auth-header h1 {
            font-size: 2rem;
            margin-bottom: var(--spacing-sm);
            color: var(--color-primary);
        }

        .auth-header p {
            color: var(--color-text-muted);
        }

        .success-state {
            display: none;
            text-align: center;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--spacing-xl);
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="nav-brand">
                <img src="assets/logo-icon.png" alt="Extractify Logo"
                    style="width: 32px; height: 32px; border-radius: 8px;">
                Extractify
            </a>
            <div class="nav-links">
                <a href="index.html#how" class="nav-link">How it Works</a>
                <a href="index.html#use-cases" class="nav-link">Use Cases</a>
                <a href="index.html#pricing" class="nav-link">Pricing</a>
                <a href="Login.html" class="btn btn-secondary" style="padding: 0.5rem 1rem;">Login</a>
                <a href="start-free.html" class="btn btn-primary" style="padding: 0.5rem 1rem;">Start Free</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div id="forgotPasswordForm">
                <div class="auth-header">
                    <h1>Reset Password</h1>
                    <p>Enter your email and we'll send you a link to reset your password.</p>
                </div>
                <form id="resetForm">
                    <div class="form-group" style="margin-bottom: var(--spacing-xl);">
                        <label class="form-label" for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="you@company.com" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-animated" style="width: 100%;">
                        Send Reset Link
                        <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>
                    </button>
                </form>
            </div>

            <div id="successState" class="success-state">
                <div class="success-icon">
                    <i data-lucide="check-circle" style="width: 32px; height: 32px;"></i>
                </div>
                <div class="auth-header">
                    <h1>Check your email</h1>
                    <p>We've sent a password reset link to <strong id="submittedEmail"></strong></p>
                </div>
                <p style="font-size: 0.875rem; color: var(--color-text-muted); margin-bottom: var(--spacing-xl);">
                    Didn't receive the email? Check your spam folder or <a href="#" id="resendBtn"
                        style="color: var(--color-primary); font-weight: 600;">try again</a>.
                </p>
            </div>

            <div style="text-align: center; margin-top: var(--spacing-xl);">
                <a href="Login.html"
                    style="color: var(--color-text-muted); font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 8px;">
                    <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i>
                    Back to Login
                </a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const form = document.getElementById('resetForm');
        const forgotFormDiv = document.getElementById('forgotPasswordForm');
        const successStateDiv = document.getElementById('successState');
        const submittedEmailSpan = document.getElementById('submittedEmail');
        const resendBtn = document.getElementById('resendBtn');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;

            // Simulation of API call
            submittedEmailSpan.textContent = email;
            forgotFormDiv.style.display = 'none';
            successStateDiv.style.display = 'block';

            // Re-create icons for the success state
            lucide.createIcons();
        });

        resendBtn.addEventListener('click', (e) => {
            e.preventDefault();
            successStateDiv.style.display = 'none';
            forgotFormDiv.style.display = 'block';
            form.reset();
        });
    </script>
</body>

</html>
