<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Free Account - Extractify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Shared Styles */
        .navbar {
            background-color: var(--color-bg-main);
            padding: var(--spacing-md) 0;
            border-bottom: 1px solid var(--color-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links {
            display: flex;
            gap: var(--spacing-lg);
            align-items: center;
        }

        .nav-link {
            font-weight: 600;
            color: var(--color-text-main);
            text-decoration: none;
        }

        .nav-link:hover {
            color: var(--color-primary);
        }

        .auth-container {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.05) 0%, rgba(134, 134, 172, 0.1) 100%);
            padding: var(--spacing-2xl) var(--spacing-md);
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            background: white;
            border-radius: var(--border-radius-xl);
            padding: var(--spacing-3xl) var(--spacing-2xl);
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--color-border);
        }

        .auth-header {
            text-align: center;
            margin-bottom: var(--spacing-2xl);
        }

        .auth-header h1 {
            font-size: 2rem;
            margin-bottom: var(--spacing-sm);
            color: var(--color-primary);
        }

        .no-code-badge {
            background-color: rgba(245, 158, 11, 0.15);
            color: #b45309;
            padding: 4px 12px;
            border-radius: var(--border-radius-pill);
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
    </style>

    <script src="js/components.js"></script>


<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="nav-brand">
                <div
                    style="width: 32px; height: 32px; background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-accent) 100%); border-radius: 8px; color: white; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; font-family: sans-serif; font-weight: bold;">
                    E</div>
                Extractify
            </a>
            <div class="nav-links">
                <a href="index.html#how" class="nav-link">How it Works</a>
                <a href="index.html#use-cases" class="nav-link">Use Cases</a>
                <a href="index.html#pricing" class="nav-link">Pricing</a>
                <a href="login.html" class="btn btn-secondary" style="padding: 0.5rem 1rem;">Login</a>
                <a href="start-free.html" class="btn btn-primary" style="padding: 0.5rem 1rem;">Start Free</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Create Free Account</h1>
                <p style="color: var(--color-text-muted); margin-bottom: 8px;">Start extracting web data in seconds</p>
                <div class="no-code-badge"><i data-lucide="sparkles" style="width: 14px; height: 14px;"></i> No Credit
                    Card Required</div>
            </div>
            <form action="dashboard.html" method="GET">
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Jane Doe" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Work Email</label>
                    <input type="email" id="email" class="form-control" placeholder="you@company.com" required>
                </div>
                <div class="form-group" style="margin-bottom: var(--spacing-xl);">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required>
                </div>
                <button type="submit" class="btn btn-primary btn-animated" style="width: 100%;">Start Extracting for
                    Free</button>
            </form>
            <div style="text-align: center; margin-top: var(--spacing-xl); color: var(--color-text-main);">
                Already have an account? <a href="login.html"
                    style="color: var(--color-primary); font-weight: 600; text-decoration: none;">Log in</a>
                <p style="font-size: 0.75rem; color: var(--color-text-muted); margin-top: 16px;">
                    By creating an account, you agree to our <a href="terms.html"
                        style="color: var(--color-text-main);">Terms of Service</a> and <a href="privacy.html"
                        style="color: var(--color-text-main);">Privacy Policy</a>.
                </p>
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
