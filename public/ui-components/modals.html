<!-- Start of Modals Component -->
<!-- Modals -->
<div id="contactModal" class="demo-modal">
    <div class="demo-modal-overlay"></div>
    <div class="demo-modal-container" style="max-width: 600px;">
        <button class="demo-close" id="closeContactBtn">&times;</button>
        <div class="demo-modal-content" style="text-align: left;">
            <h3>Contact Support</h3>
            <form id="contactForm">
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label>Email</label>
                    <input type="email" class="form-control"
                        style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;" required>
                </div>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label>Message</label>
                    <textarea class="form-control" rows="4"
                        style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;"
                        required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
            </form>
            <div id="contactSuccess" style="display: none; text-align: center; padding: 2rem 0;">
                <i data-lucide="check-circle"
                    style="width: 64px; height: 64px; color: #10b981; margin-bottom: 1rem;"></i>
                <h4>Message Sent!</h4>
                <p>We'll get back to you within 24 hours.</p>
            </div>
        </div>
    </div>
</div>

<!-- Chat Modal -->
<div id="chatModal" class="chat-modal">
    <div class="demo-modal-overlay"></div>
    <div class="chat-header">
        <div class="chat-header-info">
            <h4>Chat with us</h4>
            <p>We typically reply in minutes</p>
        </div>
        <button class="chat-close" id="closeChatBtn">
            <i data-lucide="x"></i>
        </button>
    </div>
    <div class="chat-messages" id="chatMessages">
        <!-- Messages will be injected here -->
    </div>
    <div class="chat-input-area">
        <form id="chatForm" class="chat-form">
            <input type="text" id="chatInput" class="chat-input" placeholder="Type your message..." autocomplete="off">
            <button type="submit" class="chat-send-btn">
                <i data-lucide="send"></i>
            </button>
        </form>
    </div>
</div>

<!-- Floating Action Button -->
<button id="fabBtn" class="fab">
    <i data-lucide="message-square"></i>
</button>
<!-- End of Modals Component -->
